<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#08090c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>塔防深追 Demo</title>
  <link rel="stylesheet" href="styles.css?v=card-ui2">
</head>
<body>
  <main class="phone">
    <section class="top-hud">
      <div class="hud-chip">
        <span>錢包</span>
        <strong id="walletText">10000</strong>
      </div>
      <div class="pot-chip">
        <span>POT</span>
        <div class="pot-row">
          <strong id="potText">0</strong>
          <b id="bossMultText" class="empty"></b>
        </div>
        <div class="payout-row"><span>總得分</span><strong id="payoutText">0</strong></div>
      </div>
      <div class="hud-icons">
        <button id="resetBtn" type="button" aria-label="重新開始本局">↻</button>
      </div>
      <button id="soundBtn" class="sound-toggle" type="button" aria-label="關閉音效">
        <span aria-hidden="true">♪</span>
      </button>
      <button id="speedBtn" class="speed-toggle speed-1" type="button" aria-label="speed">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="hud-chip wave-chip">
        <span>波次</span>
        <strong class="wave-value"><b id="waveText">0</b><canvas id="waveAttrIcon" width="22" height="22" hidden></canvas></strong>
      </div>
    </section>

    <section class="battlefield">
      <span id="nextAttrHint" class="next-attr-hint" role="img"><canvas id="nextAttrIcon" width="44" height="44"></canvas></span>
      <canvas id="game" width="350" height="760" aria-label="塔防戰場"></canvas>
      <div id="messageText" class="message">選擇 BET 與角色後開始戰鬥。</div>
    </section>

    <section id="towerSlots" class="tower-slots"></section>

    <section class="bottom-status" aria-label="基地與經驗狀態">
      <div class="status-row hp-status">
        <div class="status-track"><div id="hpFill" class="status-fill hp-fill"></div><strong id="hpText" class="status-value">HP 1000 / 1000</strong></div>
      </div>
      <div class="status-row exp-status">
        <div class="status-track"><div id="expFill" class="status-fill exp-fill"></div><strong class="status-value">EXP Lv.<b id="levelText">1</b>　<span id="expText">0/95</span></strong></div>
      </div>
    </section>

    <section id="entryOverlay" class="entry-overlay">
      <div class="entry-panel">
        <span class="entry-kicker">ENTER BATTLE</span>
        <h2>選擇 BET</h2>
        <div class="entry-wallet"><span>錢包</span><strong id="entryWalletText">10000</strong></div>
        <div class="entry-stepper">
          <button id="betMinusBtn" type="button" aria-label="降低 BET">−</button>
          <div><span>BET</span><strong id="betText">100</strong></div>
          <button id="betPlusBtn" type="button" aria-label="提高 BET">＋</button>
        </div>
        <div id="betOptions" class="bet-options" aria-label="BET 選項"></div>
        <button id="betBtn" class="entry-start" type="button">
          <span>開始戰局</span><small>BET <b id="entryBetText">100</b></small>
        </button>
      </div>
    </section>

    <section id="waveDecision" class="wave-decision hidden" aria-live="polite">
      <div class="decision-panel">
        <div class="decision-head">
          <span id="decisionWave">第 1 波完成</span>
          <i id="decisionDanger" class="decision-danger hidden" aria-label="下一波為 BOSS">!</i>
        </div>
        <div class="decision-score"><span>目前總得分</span><strong id="decisionPayout">0</strong></div>
        <div class="decision-actions">
          <button id="continueBtn" class="continue-button" type="button">
            <span>繼續</span><small>BET <b id="waveBetText">100</b></small>
          </button>
          <button id="collectBtn" class="collect-button" type="button" disabled>
            <span>COLLECT</span><strong id="collectText">0</strong>
          </button>
        </div>
      </div>
    </section>

    <div id="betRaiseFx" class="bet-raise-fx hidden" role="status" aria-live="polite">
      <span>BET UP</span>
      <strong><b id="betRaiseFrom">100</b><i>→</i><b id="betRaiseTo">150</b></strong>
    </div>

    <section id="choiceOverlay" class="choice-overlay hidden">
      <div class="choice-panel">
        <h2 id="choiceTitle">三選一</h2>
        <p id="choiceHint">選擇一個項目。</p>
        <div id="choiceList" class="choice-list"></div>
        <div class="choice-actions">
          <button id="rerollBtn" class="reroll-button hidden" type="button">
            <span aria-hidden="true">↻</span>
            <b>REROLL</b>
            <small id="rerollCostText">BET 100</small>
          </button>
        </div>
      </div>
    </section>

    <section id="resultOverlay" class="result-overlay hidden">
      <div class="result-panel">
        <h2 id="resultTitle">結算</h2>
        <p id="resultBody"></p>
        <button id="newRunBtn" type="button">再來一局</button>
      </div>
    </section>
  </main>
  <script src="game.js?v=card-ui2" charset="utf-8"></script>
</body>
</html>
