<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#08090c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>塔防深追 Demo</title>
  <link rel="stylesheet" href="styles.css?v=miniondeath30">
</head>
<body>
  <main class="phone">
    <section class="top-hud">
      <div class="hud-chip">
        <span>錢包</span>
        <strong id="walletText">10000</strong>
      </div>
      <div class="pot-chip">
        <span>POT</span>
        <div class="pot-row">
          <strong id="potText">0</strong>
          <b id="bossMultText" class="empty"></b>
        </div>
        <div class="payout-row"><span>總得分</span><strong id="payoutText">0</strong></div>
      </div>
      <div class="hud-icons">
        <button id="resetBtn" type="button" aria-label="重新開始本局">↻</button>
      </div>
      <button id="soundBtn" class="sound-toggle" type="button" aria-label="關閉音效">
        <span aria-hidden="true">♪</span>
      </button>
      <button id="speedBtn" class="speed-toggle speed-1" type="button" aria-label="speed">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="hud-chip wave-chip player-hidden" aria-hidden="true">
        <span>波次</span>
        <strong class="wave-value"><b id="waveText">0</b><canvas id="waveAttrIcon" width="22" height="22" hidden></canvas></strong>
      </div>
      <div class="danger-chip" hidden>
        <span>基地 HP</span>
        <strong id="hpText">1000</strong>
      </div>
      <div class="exp-chip">
        <div class="exp-label">
          <span>EXP Lv.<b id="levelText">1</b></span>
          <strong id="expText">0/95</strong>
        </div>
        <div class="exp-track">
          <div id="expFill" class="exp-fill"></div>
        </div>
      </div>
    </section>

    <section class="battlefield">
      <span id="nextAttrHint" class="next-attr-hint" role="img"><canvas id="nextAttrIcon" width="44" height="44"></canvas></span>
      <canvas id="game" width="350" height="760" aria-label="塔防戰場"></canvas>
      <div id="messageText" class="message">調整 BET 後按下 BET 開始。</div>
    </section>

    <section id="towerSlots" class="tower-slots"></section>

    <section class="bottom-ui">
      <div class="bet-stepper">
        <button id="betMinusBtn" type="button">−</button>
        <div>
          <span>本波 BET</span>
          <strong id="betText">100</strong>
        </div>
        <button id="betPlusBtn" type="button">＋</button>
      </div>
      <div class="main-actions">
        <button id="betBtn" class="bet-button" type="button">
          <span>BET</span>
          <small id="waveBetText">100</small>
        </button>
        <button id="collectBtn" class="collect-button" type="button" disabled>
          <span>COLLECT</span>
          <strong id="collectText">0</strong>
        </button>
      </div>
    </section>

    <div id="betRaiseFx" class="bet-raise-fx hidden" role="status" aria-live="polite">
      <span>BET UP</span>
      <strong><b id="betRaiseFrom">100</b><i>→</i><b id="betRaiseTo">150</b></strong>
    </div>

    <section id="choiceOverlay" class="choice-overlay hidden">
      <div class="choice-panel">
        <h2 id="choiceTitle">三選一</h2>
        <p id="choiceHint">選擇一個項目。</p>
        <div id="choiceList" class="choice-list"></div>
      </div>
    </section>

    <section id="resultOverlay" class="result-overlay hidden">
      <div class="result-panel">
        <h2 id="resultTitle">結算</h2>
        <p id="resultBody"></p>
        <button id="newRunBtn" type="button">再來一局</button>
      </div>
    </section>
  </main>
  <script src="game.js?v=miniondeath30" charset="utf-8"></script>
</body>
</html>
